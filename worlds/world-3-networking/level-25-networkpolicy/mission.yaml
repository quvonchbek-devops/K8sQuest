name: "NetworkPolicy ni Juda Cheklangan"
objective: "Frontend-dan-backend ga aloqani ta'minlash uchun haddan tashqari cheklangan NetworkPolicy ni ni tuzating"
world: 3
level: 25
xp: 250
difficulty: o'rta

description: |
  NetworkPolicy ni pod lar orasidagi qonuniy trafikni to'sib qo'ymoqda. Frontend
  backend API ga yeta olmayapti, garchi ikkala pod ham ishlayotgan va sog'lom bo'lsa ham.
  Haddan tashqari cheklangan tarmoq siyosatini aniqlang va tuzating.

concepts:
  - NetworkPolicy ni
  - Pod-dan-pod ga aloqa
  - Tarmoq siyosatlarida label selector lar
  - Ingress/Egress qoidalari

learning_objectives:
  - NetworkPolicy ni pod lar orasidagi trafikni qanday nazorat qilishini tushuning
  - Tarmoq siyosatlari sabab bo'lgan ulanish muammolarini debug qiling
  - Pod lar arasi aloqa uchun mos ingress qoidalarini sozlang
  - Aniq pod-dan-pod trafikga ruxsat berish uchun label selector lar ishlating

scenario: |
  Klasterda frontend va backend ilovani deploy qildingiz. Backend ruxsatsiz
  kirishni oldini olish uchun NetworkPolicy ni bilan himoyalangan. Biroq,
  NetworkPolicy ni JUDA cheklangan — frontend dan backend API ga kirishni to'sib
  qo'ymoqda, bu ilovaning ishdan chiqishiga olib kelmoqda.

success_criteria:
  - Frontend pod backend service ni ga muvaffaqiyatli ulana oladi
  - NetworkPolicy ni frontend dan backend ga trafikka ruxsat beradi
  - NetworkPolicy ni boshqa pod lardan trafikni to'sishda davom etadi (xavfsizlikni saqlaydi)
  - Barcha pod lar ishlayotgan va sog'lom

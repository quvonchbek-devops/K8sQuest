name: "Namespace Lar Arasi Service Aloqasi"
objective: "To'g'ri DNS FQDN yordamida namespace lar arasi service aloqasini tuzating"
world: 3
level: 27
xp: 250
difficulty: o'rta

description: |
  'k8squest' namespace dagi frontend ilova 'backend-ns' namespace dagi API ga
  murojaat qilishi kerak, lekin ulana olmayapti. Muammo — to'liq malakali domen
  nomi (FQDN) o'rniga qisqa service nomi ishlatilmoqda. Namespace lar arasi
  aloqani ta'minlash uchun DNS nomini tuzating.

concepts:
  - Namespace lar arasi service aloqasi
  - Kubernetes DNS FQDN formati
  - Namespace lar bo'ylab service aniqlash
  - Kubernetes da DNS hal qilish

# Hosted moslik (k8s-dojo P2): bu level cluster darajasidagi resurs yoki alohida
# namespace talab qiladi. Hosted sandbox — bitta izolyatsiyalangan namespace,
# scoped RBAC bilan; bunday resurslarni yaratib bo'lmaydi. Shuning uchun dars
# faqat lokal K8sQuest o'yinida o'ynaladi. Batafsil: docs/MISSION-SCHEMA.md
environments:
  hosted:
    available: false
    description: "Bu level bir nechta namespace o'rtasidagi aloqani o'rgatadi. Hosted sandbox — bitta izolyatsiyalangan namespace; boshqa namespace yaratib/ishlatib bo'lmaydi. Dars faqat lokal o'yinda o'ynaladi."

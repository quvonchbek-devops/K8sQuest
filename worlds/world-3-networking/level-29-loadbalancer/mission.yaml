name: "LoadBalancer Pending da Qotib Qoldi"
objective: "Buzilgan resurslarni tuzating va validatsiyadan o'tkazing"
difficulty: o'rta
xp: 250

description: |
  Jamoangiz LoadBalancer turidagi service deploy qildi, lekin u 10 daqiqadan beri
  "Pending" holatida qotib turgan. Tashqi klientlar ilovaga kira olmayapti. Service
  bulutli muhitda yaxshi ishlaydi, lekin lokal ishlab chiqish klasteringiz LoadBalancer
  ta'minlay olmaydi. Service turlari orasidagi farqni tushunib, lokal ishlab chiqish
  uchun to'g'ri turni tanlashingiz kerak.

concepts:
  - service-types
  - loadbalancer
  - nodeport
  - cloud-provider-integration
  - local-cluster-limitations

# Hosted moslik (k8s-dojo P2): bu level cluster darajasidagi resurs yoki alohida
# namespace talab qiladi. Hosted sandbox — bitta izolyatsiyalangan namespace,
# scoped RBAC bilan; bunday resurslarni yaratib bo'lmaydi. Shuning uchun dars
# faqat lokal K8sQuest o'yinida o'ynaladi. Batafsil: docs/MISSION-SCHEMA.md
environments:
  hosted:
    available: false
    description: "Bu level LoadBalancer turidagi Service ni o'rgatadi — u bulut provayderi yoki MetalLB ni talab qiladi. Hosted sandbox da tashqi LoadBalancer yo'q. Dars faqat lokal o'yinda o'ynaladi."

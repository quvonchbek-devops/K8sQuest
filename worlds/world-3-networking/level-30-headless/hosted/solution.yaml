# ✅ HOSTED FIX: headless service (clusterIP: None) — per-pod DNS beradi.
# Endi har pod: <pod-nomi>.web-cluster.<ns>.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: web-cluster
  namespace: k8squest
spec:
  clusterIP: None   # ✅ Headless — virtual IP yo'q!
  selector:
    app: web-cluster
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
  namespace: k8squest
spec:
  serviceName: web-cluster
  replicas: 3
  selector:
    matchLabels:
      app: web-cluster
  template:
    metadata:
      labels:
        app: web-cluster
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
          name: web

name: "StatefulSet DNS Ishlamayapti"
objective: "Buzilgan resurslarni tuzating va validatsiyadan o'tkazing"
difficulty: o'rta
xp: 250

description: |
  StatefulSet pod laringiz bir-biri bilan bashorat qilinadigan DNS nomlari orqali
  aloqa qila olmayapti. Ilova alohida pod larga pod-0.service-nomi, pod-1.service-nomi
  orqali yetishni kutadi, lekin DNS hal qilish ishlamayapti. Service ClusterIP bilan
  sozlangan, lekin StatefulSet larga to'g'ridan-to'g'ri pod-ga-pod DNS hal qilish
  uchun "headless service" deb ataladigan maxsus service turi kerak.

concepts:
  - headless-service
  - statefulset-dns
  - pod-identity
  - stable-network-identity
  - clusterip-none

# Hosted sandbox da bu level O'YNALMAYDI — dars esa lokal o'yinda o'z o'rnida.
#
# Dars: headless service (clusterIP: None) StatefulSet pod lariga barqaror
# per-pod DNS beradi. Buni ISBOTLASH per-pod DNS resolution ni talab qiladi:
# test pod ichidan `nslookup web-0.web-cluster...`. Hosted sandbox xavfsizlik
# uchun `pods/exec` ni BERMAYDI (validate.sh sandbox ning o'z SA i bilan
# ishlaydi), shuning uchun darsni bu muhitda tekshirib bo'lmaydi.
# Batafsil: docs/MISSION-SCHEMA.md
environments:
  hosted:
    available: false
    description: "Headless service DNS ni tekshirish pod ichidan DNS resolution (kubectl exec + nslookup) talab qiladi. Hosted sandbox xavfsizlik uchun pods/exec ni bermaydi. Dars faqat lokal o'yinda o'ynaladi."

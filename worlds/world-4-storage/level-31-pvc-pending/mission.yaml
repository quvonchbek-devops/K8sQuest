id: 31
title: "PVC Stuck in Pending"
objective: "Buzilgan resurslarni tuzating va validatsiyadan o'tkazing"
name: "PVC Pending da Qotib Qoldi"
difficulty: intermediate
xp: 250
xp_reward: 250
estimated_time: "15 minutes"

description: "PersistentVolumeClaim mavjud bo'lmagan StorageClass ga murojaat qilgani uchun Pending holatida qotib qolgan. Pod ishga tusholmayapti chunki volume tayyor emas."
learning_objectives:
  - Understand PersistentVolume (PV) and PersistentVolumeClaim (PVC) relationship
  - Learn how PVC binding works in Kubernetes
  - Configure PV to match PVC requirements
  - Understand saqlash hajmini and access modes

concepts:
  - persistentvolume
  - persistentvolumeclaim
  - pvc-binding
  - storage-capacity
  - access-modes
  - volume-provisioning

success_criteria:
  - PVC successfully bound to a PV
  - PVC status changes from Pending to Bound
  - Pod successfully starts and mounts the volume

hints_available: 3

# Hosted moslik (k8s-dojo P2): bu level cluster darajasidagi resurs yoki alohida
# namespace talab qiladi. Hosted sandbox — bitta izolyatsiyalangan namespace,
# scoped RBAC bilan; bunday resurslarni yaratib bo'lmaydi. Shuning uchun dars
# faqat lokal K8sQuest o'yinida o'ynaladi. Batafsil: docs/MISSION-SCHEMA.md
environments:
  hosted:
    available: false
    description: "Bu level cluster darajasidagi PersistentVolume ni o'rgatadi. Hosted sandbox scoped RBAC bilan cluster-scoped resurs yaratolmaydi. Dars faqat lokal o'yinda o'ynaladi."
